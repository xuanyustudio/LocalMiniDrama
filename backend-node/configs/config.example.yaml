app:
  name: "LocalMiniDrama API"
  version: "1.0.0"
  debug: true
  language: "zh"

server:
  port: 5679
  host: "0.0.0.0"
  cors_origins:
    - "http://localhost:3012"
  read_timeout: 600
  write_timeout: 600

database:
  type: "sqlite"
  path: "./data/drama_generator.db"
  max_idle: 10
  max_open: 100

storage:
  type: "local"
  local_path: "./data/storage"
  base_url: "http://localhost:5679/static"

ai:
  default_text_provider: "openai"
  default_image_provider: "openai"
  default_video_provider: "doubao"

style:
  default_style: ""
  default_role_style: "Modern Japanese anime style, cel-shaded."
  default_scene_style: "Modern Japanese anime style, cel-shaded."
  default_prop_style: "Modern Japanese anime style, cel-shaded."
  default_image_ratio: "16:9"
  default_video_ratio: "16:9"
  default_prop_ratio: "1:1"
  default_image_size: "1024x1024"

# 厂商锁定模式：启用后只使用指定配置文件中的 AI 服务，用户只能修改 API Key 和默认模型
vendor_lock:
  enabled: true
  config_file: "ai-configs-qudao.json"

# 中转图床（用于 Gemini 参考图上传）
image_proxy:
  # 图床 URL 有效期（小时）。zhongzhuan.chat 官方限制为 24h，建议设为 23 留出余量。
  # 到期后缓存自动失效，下次使用时会重新上传，无需手动清理。
  expire_hours: 240
  # Gemini 参考图传输方式：
  #   false（默认）→ 直接内嵌 base64 inlineData，无需图床，兼容性最好
  #   true          → 上传图床后用 fileData.fileUri 传递（部分中转站不支持，会报 Cannot fetch content from URL）
  use_for_gemini: false
